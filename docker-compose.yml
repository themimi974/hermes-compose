---
# =============================================================================
# Hermes Agent — Docker Compose
# =============================================================================
# Usage:
#   PROVIDER=ollama MODEL=llama3.1 init-hermes
#   PROVIDER=openai OPENAI_API_KEY=sk-... init-hermes
#   PROVIDER=nvidia NVIDIA_API_KEY=nvapi-... init-hermes
# =============================================================================

services:
  hermes:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hermes
    stdin_open: true
    tty: true

    working_dir: /workspace

    # -------------------------------------------------------------------------
    # Environment — pass provider + all API keys
    # -------------------------------------------------------------------------
    environment:
      HERMES_HOME: /opt/data
      working_dir: /workspace

      # Provider selection
      PROVIDER: ${PROVIDER:-nvidia}
      MODEL: ${MODEL:-}

      # Dashboard
      HERMES_DASHBOARD: ${HERMES_DASHBOARD:-0}
      HERMES_DASHBOARD_INSECURE: ${HERMES_DASHBOARD_INSECURE:-0}

      # API server (OpenAI-compatible)
      API_SERVER_ENABLED: ${API_SERVER_ENABLED:-false}
      API_SERVER_HOST: ${API_SERVER_HOST:-0.0.0.0}
      API_SERVER_KEY: ${API_SERVER_KEY:-}
      API_SERVER_CORS_ORIGINS: ${API_SERVER_CORS_ORIGINS:-*}

      # Provider API keys (all forwarded into the container)
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      HF_TOKEN: ${HF_TOKEN}
      CUSTOM_BASE_URL: ${CUSTOM_BASE_URL}
      CUSTOM_API_KEY: ${CUSTOM_API_KEY}

      # Ollama host
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}

    # -------------------------------------------------------------------------
    # Persistent volumes
    #   ../.hermes  → /opt/data    hermes state: config, sessions, memories
    #   ../         → /workspace   parent project directory
    # -------------------------------------------------------------------------
    volumes:
      - ../.hermes:/opt/data:rw,z
      - ../:/workspace:z

    # -------------------------------------------------------------------------
    # Network
    # -------------------------------------------------------------------------
    network_mode: host
    restart: "no"

    # -------------------------------------------------------------------------
    # Shared memory — some model inference backends benefit from larger /dev/shm
    # -------------------------------------------------------------------------
    shm_size: "256m"

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
